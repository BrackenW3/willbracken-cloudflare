version: '3.8'

# Foundation Architecture for Local AI Development
# Designed to be portable across RTX 4080 Desktop, MacBook Pro M3, and Windows laptops.
# This spins up the local infrastructure needed to support AI Agents and Vector DBs.
# Note: n8n is hosted externally on Railway (n8n.willbracken.com) and communicates with these via Cloudflare Tunnels or Tailscale.

services:
  # Local LLM Engine
  # On Windows/Linux with RTX 4080: Uncomment the deploy section to enable GPU.
  # On macOS (M3 Pro): Docker Desktop natively supports Metal acceleration for Ollama, no deploy block needed.
  ollama:
    image: ollama/ollama:latest
    container_name: local_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # --- UNCOMMENT FOR RTX 4080 / NVIDIA GPU ACCELERATION ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Vector Database (Qdrant) for Email Processing, RAG, and AI Memory
  qdrant:
    image: qdrant/qdrant:latest
    container_name: local_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  ollama_data:
  qdrant_data:
